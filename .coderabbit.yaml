# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ko-KR"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: false
  collapse_walkthrough: false
  path_filters:
    - "!build/**"
    - "!dist/**"
    - "!coverage/**"
    - "!node_modules/**"
    - "!package-lock.json"
  auto_review:
    enabled: true
    drafts: false

chat:
  auto_reply: true
